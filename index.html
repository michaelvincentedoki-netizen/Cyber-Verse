<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="signupBox">
        <h1> Sign Up </h1>
        <form action="login.html" method="get">
            <input class="text" type="text" name="firstName" placeholder="First Name" required>
            
              <input class="last" type="text" name="lastName" placeholder="Last Name" required>
            
              <input class="email" type="email" name="email" placeholder="Email" required>
            
            <input class="pass" type="password" name="password" placeholder="Password" required>
            
    <input class="cpass" type="password" name="confirm Password" placeholder="Confirm Password" required>
            
            <input class="number" type="number" name="Number" placeholder=" Number" required>
            
             <input class="date" type="date" name="Date of Birth" placeholder="Date of Birth" required>
             
            <button type="submit">Sign Up</button>
            <br><br>  
            <div class="loginLink">
                <p> <strong>Already have an account? <a href="login.html">Login here </strong> </a></p>
            </form>
</div>





</body>
</html>
